<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <title>Charlotte — Pannello Owner</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .owner-header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .owner-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin: 16px 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
    }
    .owner-tab {
      flex: 1 1 calc(25% - 4px);
      min-width: 0;
      padding: 9px 4px;
      text-align: center;
      border-radius: 9px;
      cursor: pointer;
      font-family: Rajdhani, sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--muted);
      transition: all 0.2s;
      border: none;
      background: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .owner-tab.active {
      background: var(--accent);
      color: white;
    }
    .tariffa-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .tariffa-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-family: Rajdhani, sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
    }
    .tariffa-badge {
      font-size: 10px;
      font-family: 'Share Tech Mono', monospace;
      padding: 3px 8px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .tariffa-badge.configured {
      background: rgba(16,185,129,0.15);
      color: var(--green);
      border: 1px solid var(--green);
    }
    .tariffa-badge.missing {
      background: rgba(239,68,68,0.15);
      color: var(--red);
      border: 1px solid var(--red);
    }
    .tariffa-fields { padding: 14px 16px; }
    .tariffa-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .tariffa-field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .tariffa-field label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .tariffa-field .wz-input { padding: 10px 12px; font-size: 15px; }
    .tariffa-msg { font-size: 13px; margin-top: 6px; min-height: 18px; text-align: center; }
    .garage-select-bar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .garage-select-bar label { font-size: 11px; color: #8a7a5a; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
    .garage-select-bar select { flex: 1; background: #f5f0e8; border: 1px solid #d4b896; border-radius: 8px; padding: 8px 10px; color: #2a2010; font-family: Rajdhani, sans-serif; font-size: 15px; outline: none; }

    /* TEMA BIANCO / VERDE OWNER */
    body { background: #f0f7f0 !important; }
    .owner-header { background: #ffffff; border-bottom: 2px solid #2e7d32; }
    .main { background: #f0f7f0; }
    .owner-tabs { background: #ffffff; border: 1px solid #c8e6c9; scrollbar-width: none; }
    .owner-tabs::-webkit-scrollbar { display: none; }
    .owner-tab { color: #558b57; }
    .owner-tab.active { background: #2e7d32; color: #ffffff; }
    .tariffa-card { background: #ffffff; border: 1px solid #c8e6c9; }
    .tariffa-card-header { background: #f1f8f1; border-bottom: 1px solid #c8e6c9; color: #1b5e20; }
    .tariffa-badge.configured { background: rgba(46,125,50,0.12); color: #2e7d32; border: 1px solid #2e7d32; }
    .tariffa-badge.missing { background: rgba(198,40,40,0.1); color: #c62828; border: 1px solid #e53935; }
    .tariffa-field label { color: #558b57; }
    .wz-input { background: #f1f8f1; border: 1px solid #a5d6a7; color: #1b5e20; }
    .wz-input:focus { border-color: #2e7d32; }
    .wz-btn-primary { background: linear-gradient(135deg, #2e7d32, #1b5e20); color: #ffffff; }
    .wz-btn-secondary { background: #ffffff; border: 1px solid #a5d6a7; color: #2e7d32; }
    .section-label { color: #558b57; }
    .empty-state .empty-text { color: #558b57; }
    .garage-select-bar { background: #ffffff; border: 1px solid #c8e6c9; }
    .garage-select-bar label { color: #558b57; }
    .garage-select-bar select { background: #f1f8f1; border: 1px solid #a5d6a7; color: #1b5e20; }
    .tariffa-msg { color: #1b5e20; }
    select option { background: #f1f8f1; color: #1b5e20; }
    .sosta-card { background: #ffffff; border-color: #c8e6c9; }
    .sosta-targa { color: #1b5e20; }
    .sosta-tipo { color: #558b57; }
    .sosta-time { color: #2e7d32; }
    .sosta-duration { color: #558b57; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="owner-header">
  <div style="display:flex;align-items:center;gap:10px">
    <a href="index.html" style="width:32px;height:32px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:16px">←</a>
    <div style="font-family:Rajdhani,sans-serif;font-weight:700;font-size:18px;letter-spacing:1px;background:linear-gradient(90deg,var(--accent3),var(--white));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
      Pannello Owner
    </div>
  </div>
  <div style="font-size:11px;color:var(--muted);font-family:'Share Tech Mono',monospace" id="owner-company-name"></div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- Selezione garage -->
  <div class="garage-select-bar">
    <label>Garage</label>
    <select id="owner-garage-select"></select>
  </div>

  <!-- Tab -->
  <div class="owner-tabs">
    <button class="owner-tab active" data-tab="tariffe" onclick="mostraSezioneOwner('tariffe')">💰 <span data-i18n="owner_tab_tariffe">Tariffe</span></button>
    <button class="owner-tab" data-tab="convenzioni" onclick="mostraSezioneOwner('convenzioni')">🤝 <span data-i18n="owner_tab_convenzioni">Convenzioni</span></button>
    <button class="owner-tab" data-tab="storico" onclick="mostraSezioneOwner('storico')">📊 <span data-i18n="owner_tab_storico">Storico</span></button>
    <button class="owner-tab" data-tab="operatori" onclick="mostraSezioneOwner('operatori')">👥 <span data-i18n="owner_tab_operatori">Operatori</span></button>
    <button class="owner-tab" data-tab="prenotazioni" onclick="mostraSezioneOwner('prenotazioni')">📅 <span data-i18n="owner_tab_prenotazioni">Prenotazioni</span></button>
    <button class="owner-tab" data-tab="turni" onclick="mostraSezioneOwner('turni')">🕐 <span data-i18n="owner_tab_turni">Turni</span></button>
    <button class="owner-tab" data-tab="garages" onclick="mostraSezioneOwner('garages')">🏢 <span data-i18n="owner_tab_garages">Garages</span></button>
  </div>

  <!-- Sezione Tariffe -->
  <div class="owner-section" id="owner-tariffe">
    <div class="section-label" style="margin-bottom:12px" data-i18n="owner_lbl_tariffe">Configura le tariffe per ogni categoria di veicolo</div>
    <div id="tariffe-container"></div>
  </div>

  <!-- Sezione Convenzioni -->
  <div class="owner-section" id="owner-convenzioni" style="display:none">
    <div class="section-label" style="margin-bottom:12px" data-i18n="owner_lbl_convenzioni">Gestisci le convenzioni con hotel e aziende</div>
    <div id="convenzioni-container"></div>
  </div>

  <!-- Sezione Storico -->
  <div class="owner-section" id="owner-storico" style="display:none">
    <div class="section-label" style="margin-bottom:12px" data-i18n="owner_lbl_storico">Storico soste</div>
    <div id="storico-container"></div>
  </div>

  <!-- Sezione Operatori -->
  <div class="owner-section" id="owner-operatori" style="display:none">
    <div class="section-label" style="margin-bottom:12px" data-i18n="owner_lbl_operatori">Gestisci gli operatori del garage</div>
    <div id="operatori-container"></div>
  </div>

  <!-- Sezione Prenotazioni -->
  <div class="owner-section" id="owner-prenotazioni" style="display:none">
    <div class="section-label" style="margin-bottom:12px" data-i18n="owner_lbl_prenotazioni">Prenotazioni ricevute</div>
    <div id="prenotazioni-container"></div>
  </div>

  <!-- Sezione Turni -->
  <div class="owner-section" id="owner-turni" style="display:none">
    <div class="section-label" style="margin-bottom:12px" data-i18n="owner_lbl_turni">Turni e timbrature operatori</div>
    <div id="turni-container"></div>
  </div>

  <!-- Sezione Garages -->
  <div class="owner-section" id="owner-garages" style="display:none">
    <div class="section-label" style="margin-bottom:12px" data-i18n="owner_lbl_garages">Gestisci i tuoi garages</div>
    <div id="garages-container"></div>
  </div>

</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  (function() {
    var v = Date.now();
    var files = ['js/config.js','js/lang.js','js/auth.js','js/tariffe.js','js/owner.js'];
    var loaded = 0;
    files.forEach(function(f) {
      var s = document.createElement('script');
      s.src = f + '?v=' + v;
      s.onload = function() {
        loaded++;
        if (loaded === files.length) {
          initApp();
        }
      };
      document.head.appendChild(s);
    });
  })();

  async function initApp() {
    initSupabase();

    const { data: { session } } = await sbClient.auth.getSession();
    if (!session) {
      window.location.href = 'index.html';
      return;
    }

    currentUser = session.user;

    const company = localStorage.getItem('charlotte_company');
    const el = document.getElementById('owner-company-name');
    if (el && company) el.textContent = company;

    await inizializzaOwner();
    applicaTraduzioniOwner();
  }

  function applicaTraduzioniOwner() {
    const lang = localStorage.getItem('charlotte_lang') || 'it';
    const en = lang === 'en';
    const tabMap = {
      tariffe:      en ? '💰 Rates'       : '💰 Tariffe',
      convenzioni:  en ? '🤝 Agreements'  : '🤝 Convenzioni',
      storico:      en ? '📊 History'     : '📊 Storico',
      operatori:    en ? '👥 Operators'   : '👥 Operatori',
      prenotazioni: en ? '📅 Bookings'    : '📅 Prenotazioni',
      turni:        en ? '🕐 Shifts'      : '🕐 Turni',
      garages:      en ? '🏢 Garages'     : '🏢 Garages',
    };
    document.querySelectorAll('.owner-tab').forEach(function(btn) {
      var tab = btn.dataset.tab;
      if (tabMap[tab]) btn.textContent = tabMap[tab];
    });
    const sectionMap = {
      'owner-tariffe':      en ? 'Configure rates for each vehicle category'    : 'Configura le tariffe per ogni categoria di veicolo',
      'owner-convenzioni':  en ? 'Manage agreements with hotels and companies'  : 'Gestisci le convenzioni con hotel e aziende',
      'owner-storico':      en ? 'Stay history'                                 : 'Storico soste',
      'owner-operatori':    en ? 'Manage garage operators'                      : 'Gestisci gli operatori del garage',
      'owner-prenotazioni': en ? 'Received bookings'                            : 'Prenotazioni ricevute',
      'owner-turni':        en ? 'Operator shifts and clock-ins'                : 'Turni e timbrature operatori',
      'owner-garages':      en ? 'Manage your garages'                          : 'Gestisci i tuoi garages',
    };
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      var sectionId = el.closest('.owner-section')?.id;
      if (sectionId && sectionMap[sectionId]) el.textContent = sectionMap[sectionId];
    });
  }
</script>

</body>
</html>
